<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Finance-Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!--Section 1: Balance header-->
    <div class="header">
        <h1>💰 Finance Tracker</h1>
        <div class="balance" id="totalBalance">$0.00</div>
        <div class="balance-cards">
            <div class="balance-card income-card">
                <p>Total Income</p>
                <h3 id="totalIncome">$0.00</h3>
            </div>
            <div class="balance-card expense-card">
                <p>Total Expenses</p>
                <h3 id="totalExpense">$0.00</h3>
            </div>
    </div>

<!--Section 2: Add transaction form-->
    <div class="form-section">
        <h2>Add Transaction</h2>
        <input type="text" id="title" placeholder="Title">
        <input type="number"  id="amount" placeholder="Amount">
        <select id="type">
            <option value="INCOME">Income</option>
            <option value="EXPENSE">Expense</option>
        </select>
        <select id="category">
            <option value="FOOD">🍕Food</option>
            <option value="SALARY">💰 Salary</option>
            <option value="TRANSPORT">🚗 Transport</option>
            <option value="ENTERTAINMENT">🎬 Entertainment</option>
            <option value="OTHER">Other</option>
        </select>
        <input type="date" id="date">
        <button id="addBtn">Add Transaction</button>
    </div>
<!--Section 3: List of transactions-->
    <div class="transaction-section">
        <h2>Recent Transactions</h2>
        <div id="transactionList">
            <div class="empty-state">
                No transactions yet. Add one above! 👆
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
